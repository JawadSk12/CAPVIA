version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_simulation
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: { context: ., dockerfile: docker/backend/Dockerfile }
    env_file: backend/.env.production
    depends_on: [postgres, redis]
    restart: unless-stopped

  celery:
    build: { context: ., dockerfile: docker/backend/Dockerfile }
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=4
    env_file: backend/.env.production
    depends_on: [redis, postgres]
    restart: unless-stopped

  nginx:
    build: { context: ., dockerfile: docker/nginx/Dockerfile }
    ports: ["80:80", "443:443"]
    depends_on: [backend, frontend]
    restart: unless-stopped

  frontend:
    build: { context: ., dockerfile: docker/frontend/Dockerfile }
    depends_on: [backend]
    restart: unless-stopped

volumes:
  postgres_data:
