apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-simulation
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ai-simulation/backend:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef: { name: ai-simulation-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30; periodSeconds: 10
