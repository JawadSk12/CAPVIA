apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ai-simulation
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: ai_simulation }
            - { name: POSTGRES_USER, valueFrom: { secretKeyRef: { name: ai-simulation-secrets, key: DB_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: ai-simulation-secrets, key: DB_PASSWORD } } }
          volumeMounts:
            - { name: postgres-storage, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: postgres-storage }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: 20Gi }
