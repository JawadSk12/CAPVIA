apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: ai-simulation
spec:
  replicas: 2
  selector:
    matchLabels: { app: celery-worker }
  template:
    metadata:
      labels: { app: celery-worker }
    spec:
      containers:
        - name: celery
          image: ai-simulation/backend:latest
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef: { name: ai-simulation-secrets }
