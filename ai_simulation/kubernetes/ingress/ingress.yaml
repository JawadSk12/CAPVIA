apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-simulation-ingress
  namespace: ai-simulation
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /api; pathType: Prefix; backend: { service: { name: backend, port: { number: 8000 } } }
          - path: /; pathType: Prefix; backend: { service: { name: frontend, port: { number: 80 } } }
