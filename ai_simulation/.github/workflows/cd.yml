name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: bash scripts/ci/build-images.sh ${{ github.sha }}
      - name: Deploy to staging
        run: bash scripts/deploy/deploy-staging.sh ${{ github.sha }}
