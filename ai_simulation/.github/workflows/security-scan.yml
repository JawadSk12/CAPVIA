name: Security Scan

on:
  schedule:
    - cron: '0 2 * * 1'
  push:
    branches: [main]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd frontend && npm audit --audit-level=high
      - run: cd backend && pip install safety && safety check -r requirements.txt
